services:
  - type: web
    name: ff-know-ai
    runtime: python
    region: singapore
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python render_start.py
    disk:
      name: ff-know-ai-data
      mountPath: /var/data
      sizeGB: 5
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FF_APP_DATA_ROOT
        value: /var/data/ff-know-ai
      - key: STREAMLIT_BROWSER_GATHER_USAGE_STATS
        value: "false"
      - key: REQUIRE_APP_PASSWORD
        value: "true"
      - key: APP_ACCESS_PASSWORD
        sync: false
      - key: AUTO_SYNC_ON_START
        value: "false"
      - key: SHAREPOINT_SKIP_MISSING_FOLDERS
        value: "true"
      - key: GEMINI_API_KEY
        sync: false
      - key: SHAREPOINT_CLIENT_ID
        sync: false
      - key: SHAREPOINT_TENANT_ID
        sync: false
      - key: SHAREPOINT_CLIENT_SECRET
        sync: false
      - key: SHAREPOINT_HOST
        value: flexfitcom.sharepoint.com
      - key: SHAREPOINT_SITE_PATH
        value: /sites/Intranet
      - key: SHAREPOINT_SITE_NAME
        value: Intranet
      - key: PERSONNEL_GOOGLE_SHEET_URL
        value: https://docs.google.com/spreadsheets/d/1SLIC1gLgD6z7_LhIkxXA8mHX5RBv-cKn/edit?gid=820290981#gid=820290981
      - key: PERSONNEL_SHEET_NAME
        value: Tuần này
      - key: ZALO_OA_ACCESS_TOKEN
        sync: false
      - key: ZALO_OA_REFRESH_TOKEN
        sync: false
      - key: ZALO_APP_ID
        sync: false
      - key: ZALO_APP_SECRET
        sync: false
      - key: ZALO_WEBHOOK_SECRET
        sync: false
      - key: ZALO_ALLOWED_EVENTS
        value: user_send_text,user_send_message,user_send_text_message
      - key: ZALO_MAX_REPLY_CHARS
        value: "1800"
      - key: ZALO_CONVERSATION_TTL_SECONDS
        value: "1800"
      - key: ZALO_VERIFY_META_CONTENT
        sync: false
      - key: ADMIN_SYNC_SECRET
        sync: false
      - key: ENABLE_GEMINI_PDF_OCR
        value: "true"
      - key: GEMINI_OCR_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_ANSWER_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_OCR_MAX_PAGES
        value: "40"
